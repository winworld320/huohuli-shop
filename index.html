function detectLang() {
  const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  if (lang.startsWith('zh')) return 'zh';
  if (lang.startsWith('ja')) return 'ja';
  if (lang.startsWith('de')) return 'de';
  if (lang.startsWith('fr')) return 'fr';
  if (lang.startsWith('es')) return 'es';
  return 'en';
}

// Deep Link logic
// ══════════════════════════════════════════════
function openChannel(platform, id, webUrl, productTitle) {
  // GA4 事件追踪
  gtag('event', 'channel_click', {
    platform: platform,
    product_id: id,
    product_name: productTitle || '',
  });

  var ua = navigator.userAgent || '';
  var isTikTokBrowser = /musical_ly|TikTok|BytedanceWebview|ByteLocale/i.test(ua);
  var isWechat = /MicroMessenger/i.test(ua);

  var appUrl = '';
  if (platform === 'amazon') {
    // iOS 用 com.amazon.mobile.shopping.web://，Android 用 intent: 方式
    var isAndroid = /android/i.test(ua);
    if (isAndroid) {
      appUrl = 'intent://www.amazon.com/dp/' + id + '#Intent;package=com.amazon.mShop.android.shopping;scheme=https;end';
    } else {
      appUrl = 'com.amazon.mobile.shopping.web://amazon.com/dp/' + id;
    }
  } else if (platform === 'tiktok') {
    appUrl = 'snssdk1233://webcast/room/';
    webUrl = 'https://www.tiktok.com/t/ZT983eLkjKUoD-DbDy4/';
  }

  if (!appUrl) {
    window.location.href = webUrl;
    return;
  }

  // TikTok / 微信内置浏览器：直接 location.href 跳 App Scheme，1秒没响应跳网页
  if (isTikTokBrowser || isWechat) {
    window.location.href = appUrl;
    setTimeout(function(){ window.location.href = webUrl; }, 1000);
    return;
  }

  // 普通浏览器：新标签先跳 App Scheme，1秒后降级网页
  var newTab = window.open('', '_blank');
  if (!newTab) {
    // 弹窗被拦截，回退到当前页跳转
    window.location.href = appUrl;
    setTimeout(function(){ window.location.href = webUrl; }, 1000);
    return;
  }

  newTab.document.write(
    '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
    '<meta name="viewport" content="width=device-width,initial-scale=1">' +
    '<title>Redirecting...</title>' +
    '<style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#fff5f7;flex-direction:column;gap:12px}' +
    'p{color:#999;font-size:.9rem}a{color:#d65d0e;font-size:.85rem}</style></head>' +
    '<body><p>Opening app...</p>' +
    '<a href="' + webUrl + '">Click here if not redirected</a>' +
    '<script>' +
    'window.location.href = "' + appUrl + '";' +
    'setTimeout(function(){ window.location.href = "' + webUrl + '"; }, 1000);' +
    '<\/script></body></html>'
  );
  newTab.document.close();
}

const PRODUCTS = [

  // {
  //   id:1, color:"颜色", neckline:"领型",
  //   title:"产品标题",
  //   images:["图片URL1","图片URL2"],
  //   price:价格, compareAt:原价,

  //   variants:{S:id,M:id,L:id,XL:id,"2XL":id,"3XL":id,"4XL":id}
  // }
];

const state = {};
PRODUCTS.forEach(p => state[p.id] = null);

function getAmazonUrl(p) {
  return p.amazon_url || ('https://www.amazon.com/dp/' + p.amazon_asin);
}

function shopifyUrl(p) {
  const sz = state[p.id];
  const vid = sz ? p.variants[sz] : null;
  const base = 'https://huohuli.myshopify.com/products/' + p.handle;
  return vid ? base + '?variant=' + vid : base;
}

function selectSize(productId, size, el) {
  state[productId] = size;
  el.closest('.size-picker').querySelectorAll('.sz').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  el.closest('.card-right').querySelector('.size-label').textContent = T.sizeSelected + ' ' + size;
  const card = el.closest('.card');
  const p = PRODUCTS.find(x => x.id === productId);
  const btn = card.querySelector('.btn-shopify');
  btn.href = shopifyUrl(p);
  btn.querySelector('.ch-label').textContent = T.btnShopify + ' (' + size + ')';
}

function slide(btn, dir) {
  const wrap = btn.closest('.img-wrap');
  const slider = wrap.querySelector('.img-slider');
  const slides = slider.querySelectorAll('.img-slide');
  const dots = wrap.querySelectorAll('.img-dot');
  let idx = parseInt(slider.dataset.idx || 0) + dir;
  if (idx < 0) idx = slides.length - 1;
  if (idx >= slides.length) idx = 0;
  slider.dataset.idx = idx;
  slider.style.transform = 'translateX(-' + (idx * 100) + '%)';
  dots.forEach((d, i) => d.classList.toggle('on', i === idx));
}

function renderCard(p) {
  const save = Math.round((1 - p.price / p.compareAt) * 100);
  const sizes = Object.keys(p.variants);
  const dots = p.images.map((_, i) => '<div class="img-dot ' + (i===0?'on':'') + '"></div>').join('');
  const slides = p.images.map(src => '<div class="img-slide"><img src="' + src + '" alt="' + p.title + '" loading="lazy"/></div>').join('');
  const szBtns = sizes.map(sz => '<button class="sz" onclick="selectSize(' + p.id + ',\'' + sz + '\',this)">' + sz + '</button>').join('');
  const amazonUrl = getAmazonUrl(p);
  const navBtns = p.images.length > 1
    ? '<div class="img-nav"><button class="img-arrow" onclick="slide(this,-1)">&#8249;</button><button class="img-arrow" onclick="slide(this,1)">&#8250;</button></div><div class="img-dots">' + dots + '</div>'
    : '';

  return '<div class="card" data-color="' + p.color + '">'
    // LEFT: image
    + '<div class="img-wrap">'
    +   '<div class="img-slider" data-idx="0">' + slides + '</div>'
    +   navBtns
    +   '<div class="color-tag">' + p.color + '</div>'
    +   '<div class="badge">-' + save + '%</div>'
    + '</div>'
    // RIGHT: info
    + '<div class="card-right">'
    +   '<div class="card-title">' + p.title + '</div>'
    +   '<div class="card-meta">' + p.neckline + ' · 2-Piece Set · S\u20134XL</div>'
    +   '<div class="price-row"><span class="price">$' + p.price.toFixed(2) + '</span><span class="price-orig">$' + p.compareAt.toFixed(2) + '</span><span class="price-save">Save ' + save + '%</span></div>'
    +   '<div class="coupon-bar">&#127903; <span>' + T.couponText + '</span> <span class="coupon-code">7TY35TAK</span> <span class="coupon-off">&#8594; 29% OFF</span></div>'
    +   '<div class="size-label">' + T.sizeChoose + '</div>'

let currentFilter = 'all';
function filterColor(btn) {
  currentFilter = btn.dataset.color;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}
function renderGrid() {
  const filtered = currentFilter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.color === currentFilter);
  document.getElementById('productGrid').innerHTML = filtered.map(renderCard).join('');
}
renderGrid();
